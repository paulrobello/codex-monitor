# Pre-commit hooks for codex-monitor
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1500']
      - id: check-merge-conflict
      - id: mixed-line-ending

  # Swift formatting
  - repo: local
    hooks:
      - id: swift-format
        name: swift-format
        description: Format Swift code with swift-format
        entry: swift-format format --in-place
        language: system
        types: [swift]

  # Swift build check
  - repo: local
    hooks:
      - id: swift-build
        name: swift build
        description: Verify Swift project builds
        entry: make build
        language: system
        types: [swift]
        pass_filenames: false

  # Swift tests
  - repo: local
    hooks:
      - id: swift-test
        name: swift test
        description: Run Swift tests
        entry: make test
        language: system
        types: [swift]
        pass_filenames: false
